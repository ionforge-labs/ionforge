name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest --cov

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
      - run: uv sync --extra dev
      - name: Install SDK dependencies
        run: cd packages/schema && pnpm install --frozen-lockfile
      - name: Regenerate schemas
        run: cd packages/schema && pnpm run generate
      - name: Check generated files are up to date
        run: git diff --exit-code packages/schema/src/geometry/schema.generated.ts
      - name: Type-check
        run: cd packages/schema && pnpm run typecheck
      - name: Lint
        run: cd packages/schema && pnpm run check
      - name: Build
        run: cd packages/schema && pnpm run build
